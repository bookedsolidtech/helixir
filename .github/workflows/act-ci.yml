name: Local CI

on:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm run format:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Run TypeScript strict check
        run: pnpm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Run tests
        run: pnpm run test

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [lint, format, type-check, build, test]
    if: always()
    steps:
      - name: Check all gates
        run: |
          FAIL=0
          for gate in lint format type-check build test; do
            case "$gate" in
              lint)       result="${{ needs.lint.result }}" ;;
              format)     result="${{ needs.format.result }}" ;;
              type-check) result="${{ needs.type-check.result }}" ;;
              build)      result="${{ needs.build.result }}" ;;
              test)       result="${{ needs.test.result }}" ;;
            esac
            echo "$gate: $result"
            if [[ "$result" != "success" ]]; then FAIL=1; fi
          done
          [[ "$FAIL" -eq 0 ]] && echo "All gates passed!" || { echo "Gates failed"; exit 1; }
