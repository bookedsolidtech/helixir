name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: '9'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan publish payload for secrets
        run: |
          PAYLOAD=$(pnpm pack --dry-run 2>&1)
          if echo "$PAYLOAD" | grep -qE '(^|\s)\.env'; then
            echo "ERROR: .env files detected in publish payload"
            echo "$PAYLOAD"
            exit 1
          fi
          if echo "$PAYLOAD" | grep -qE '(^|\s)\.automaker'; then
            echo "ERROR: .automaker files detected in publish payload"
            echo "$PAYLOAD"
            exit 1
          fi
          echo "Publish payload clean - no .env or .automaker files detected"

      - name: Scan build artifacts for secrets
        run: gitleaks detect --config .gitleaks.toml --source ./build --no-git --verbose --redact

      - name: Version and Publish
        uses: changesets/action@v1
        with:
          publish: pnpm run changeset:publish
          version: pnpm run changeset:version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
          HUSKY: '0'
