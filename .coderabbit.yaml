# CodeRabbit Configuration
# https://docs.coderabbit.ai/getting-started/configure-coderabbit

version: '2'

reviews:
  profile: 'assertive'
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev
      - staging
    ignore_title_keywords:
      - 'AUDIT'
      - 'audit'
      - 'Deep Audit'
      - 'deep-audit'
    path_filters:
      - '!**/AUDIT.md'

  finishing_touches:
    docstrings:
      enabled: false

chat:
  auto_reply: true

code_generation:
  docstrings:
    language: 'en-US'
