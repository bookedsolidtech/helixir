name: helixir-feature
description: New feature implementation for HELiXiR MCP server
phases:
  - state: INTAKE
    enabled: true
  - state: PLAN
    enabled: true
  - state: EXECUTE
    enabled: true
  - state: REVIEW
    enabled: true
  - state: MERGE
    enabled: true
  - state: DEPLOY
    enabled: true
agent:
  role: principal-engineer
  model: sonnet
execution:
  useWorktrees: true
  gitWorkflow:
    autoCommit: true
    autoPush: true
    autoCreatePR: true
    autoMergePR: true
    prBaseBranch: dev
  terminalStatus: review
match:
  categories: [feature, tool, mcp-tool]
  keywords: [feature, tool, implement, add]
