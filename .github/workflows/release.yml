name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no publish)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for semantic-release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: pnpm/action-setup@v4
        with:
          version: '>=9'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm exec semantic-release --dry-run
          else
            pnpm exec semantic-release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Notify Discord
        if: success()
        run: |
          VERSION=$(node -p "require('./package.json').version")
          REPO_URL="https://github.com/${{ github.repository }}"

          if [ -n "${{ secrets.DISCORD_RELEASE_WEBHOOK }}" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"HELiXiR v${VERSION} Released\",
                  \"url\": \"${REPO_URL}/releases/tag/v${VERSION}\",
                  \"color\": 5814783,
                  \"fields\": [
                    { \"name\": \"npm\", \"value\": \"\`npm install helixir@${VERSION}\`\", \"inline\": true },
                    { \"name\": \"GitHub\", \"value\": \"[Release Notes](${REPO_URL}/releases/tag/v${VERSION})\", \"inline\": true }
                  ],
                  \"footer\": { \"text\": \"Automated release via semantic-release\" }
                }]
              }" \
              "${{ secrets.DISCORD_RELEASE_WEBHOOK }}"
          fi
