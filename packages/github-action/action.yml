name: 'helixir Quality Gates'
description: 'Run helixir CLI in PR workflows for web component health checks, breaking change detection, and accessibility grading'
author: 'Booked Solid Tech'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  checks:
    description: 'Comma-separated list of checks to run: health, breaking-changes, accessibility'
    required: false
    default: 'health,breaking-changes,accessibility'
  health-threshold:
    description: 'Minimum health score (0–100) required for components to pass'
    required: false
    default: '70'
  fail-on-breaking:
    description: 'Fail the check if breaking changes are detected'
    required: false
    default: 'true'
  fail-on-warning:
    description: 'Fail the check if minor (warning-level) breaking changes are detected'
    required: false
    default: 'false'
  comment:
    description: 'Post a summary comment on the pull request'
    required: false
    default: 'true'
  config-path:
    description: 'Path to mcpwc.config.json (auto-discovered if not set)'
    required: false
    default: ''
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  helixir-version:
    description: 'Version of helixir to install (default: latest)'
    required: false
    default: 'latest'

outputs:
  health-score:
    description: 'Average health score across all components (empty if health check skipped)'
  failing-components:
    description: 'Number of components that failed the health threshold'
  breaking-changes-count:
    description: 'Number of breaking changes detected'
  passed:
    description: 'Whether all quality gates passed (true/false)'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install helixir
      shell: bash
      run: |
        if [ "${{ inputs.helixir-version }}" = "latest" ]; then
          npm install -g helixir
        else
          npm install -g helixir@${{ inputs.helixir-version }}
        fi
        helixir --version || echo "helixir installed via npm global"

    - name: Install and build action
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm install && npm run build

    - name: Run helixir quality gates
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_CHECKS: ${{ inputs.checks }}
        INPUT_HEALTH-THRESHOLD: ${{ inputs.health-threshold }}
        INPUT_FAIL-ON-BREAKING: ${{ inputs.fail-on-breaking }}
        INPUT_FAIL-ON-WARNING: ${{ inputs.fail-on-warning }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_CONFIG-PATH: ${{ inputs.config-path }}
      run: node ${{ github.action_path }}/dist/index.js
