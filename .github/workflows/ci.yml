name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal CI during bootstrap phase.
# Full gates (build, test, format, audit) added after core implementation is complete.
jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '>=9'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
