name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install npm 11.5.1+ for OIDC trusted publishing
        # pnpm publish shells out to the npm CLI for the registry PUT.
        # Node 22's bundled npm (10.9.7) cannot perform OIDC trusted
        # publishing and fails with a misleading "E404 not in this
        # registry". Pin npm to 11.5.1 (first version with working TP-OIDC).
        # --force gets past Node 22's bundled-npm arborist on the upgrade.
        run: |
          npm install -g npm@11.5.1 --force
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan publish payload for secrets
        run: |
          # pnpm 9 dropped the `pack --dry-run` flag — use `publish --dry-run`
          # which prints the same `Tarball Contents` listing and DOES NOT push
          # to npm. The previous `pack --dry-run` died with `Unknown option`
          # and set -e collapsed the assignment. (Fix lands 2026-05-11.)
          set +e
          PAYLOAD=$(pnpm publish --dry-run --no-git-checks 2>&1)
          set -e
          if echo "$PAYLOAD" | grep -qE '(^|\s)\.env'; then
            echo "ERROR: .env files detected in publish payload"
            echo "$PAYLOAD"
            exit 1
          fi
          if echo "$PAYLOAD" | grep -qE '(^|\s)\.automaker'; then
            echo "ERROR: .automaker files detected in publish payload"
            echo "$PAYLOAD"
            exit 1
          fi
          echo "Publish payload clean - no .env or .automaker files detected"

      - name: Scan build artifacts for secrets
        run: gitleaks detect --config .gitleaks.toml --source ./build --no-git --verbose --redact

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file sbom.json --output-format json

      - name: Upload SBOM as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error

      - name: Version and Publish
        uses: changesets/action@v1
        with:
          publish: pnpm run changeset:publish
          version: pnpm run changeset:version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
          HUSKY: '0'
