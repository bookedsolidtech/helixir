# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit Configuration
# https://docs.coderabbit.ai/getting-started/configure-coderabbit

reviews:
  profile: 'assertive'
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - dev
    ignore_title_keywords:
      - 'AUDIT'
      - 'audit'
      - 'Deep Audit'
      - 'deep-audit'
    path_filters:
      - '!**/AUDIT.md'
      - '!.automaker/**'
      - '!build/**'
      - '!pnpm-lock.yaml'
      - '!.changeset/**'
      - '!.worktrees/**'
      - '!.husky/**'
      - '!coverage/**'
      - '!node_modules/**'
      - '!**/*.map'

  finishing_touches:
    docstrings:
      enabled: false

chat:
  auto_reply: true

code_generation:
  docstrings:
    language: 'en-US'
