name: helixir-docs
description: Documentation updates for HELiXiR
phases:
  - state: INTAKE
    enabled: true
  - state: PLAN
    enabled: false
  - state: EXECUTE
    enabled: true
  - state: REVIEW
    enabled: true
  - state: MERGE
    enabled: true
  - state: DEPLOY
    enabled: false
agent:
  role: technical-writer
  model: sonnet
execution:
  useWorktrees: true
  gitWorkflow:
    autoCommit: true
    autoPush: true
    autoCreatePR: true
    autoMergePR: true
    prBaseBranch: dev
  terminalStatus: review
match:
  categories: [docs, documentation]
  keywords: [docs, documentation, guide]
